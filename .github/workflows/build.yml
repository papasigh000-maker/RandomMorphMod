name: Build and Release Mod JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Grant execute permission to gradlew
      run: chmod +x ./gradlew
    
    - name: Download Gradle
      run: |
        mkdir -p gradle/wrapper
        curl -L https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        mv /tmp/gradle-8.1.1 ~/.gradle/wrapper/gradle-8.1.1
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v3
      with:
        name: randommorph-jar
        path: build/libs/randommorph-1.0.0.jar
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: build/libs/randommorph-1.0.0.jar
        tag_name: v1.0.0
        name: Random Morph Mod v1.0.0
        body: |
          # Random Morph Mod v1.0.0
          
          **Minecraft 1.20.1 Forge Mod**
          
          ## Features
          - 🔄 Automatically morph into random mobs every 5 minutes (configurable)
          - 🎨 8 particle types to choose from
          - 🔊 Mob-specific sounds for each transformation
          - 💬 Chat notifications
          - 50+ supported mobs
          - ⚙️ Fully configurable
          
          ## Installation
          1. Download `randommorph-1.0.0.jar`
          2. Place it in your `mods` folder
          3. Make sure you have Remorphed mod installed
          4. Launch Minecraft with Forge 1.20.1
          
          ## Configuration
          Edit `config/randommorph-config.toml` to customize:
          - Morph interval (1-60 minutes)
          - Particle type (WITCH, CRIMSON_SPORE, MYCELIUM, SOUL, HAPPY_VILLAGER, EXPLOSION, PORTAL, ENCHANT)
          - Enable/disable particles, sounds, and messages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
